<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Analytics - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/ui.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/spinners.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- Page Load Spinner Overlay -->
<div class="spinner-overlay" id="pageSpinner">
    <div class="spinner"></div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-robot me-2"></i>Virtual Customer Success Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link" href="/complaints">Complaints</a>
            <a class="nav-link" href="/events">Events</a>
            <a class="nav-link active" href="/analytics">Analytics</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="fw-bold mb-4"><i class="fas fa-chart-bar text-purple me-2"></i>Community Analytics</h4>

    <!-- Stats Cards -->
    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card text-center shadow-sm border-0">
                <div class="card-body">
                    <h2 class="fw-bold text-purple" th:text="${complaintStats.total}">0</h2>
                    <p class="text-muted mb-0">Total Complaints</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow-sm border-0">
                <div class="card-body">
                    <h2 class="fw-bold text-success" th:text="${complaintStats.resolved}">0</h2>
                    <p class="text-muted mb-0">Resolved</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow-sm border-0">
                <div class="card-body">
                    <h2 class="fw-bold text-info" th:text="${totalEvents}">0</h2>
                    <p class="text-muted mb-0">Total Events</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center shadow-sm border-0">
                <div class="card-body">
                    <h2 class="fw-bold text-warning" th:text="${activeEvents}">0</h2>
                    <p class="text-muted mb-0">Active Events</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts Row with Skeleton Loading -->
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Complaints by Status</div>
                <div class="card-body" id="statusChartContainer">
                    <div class="skeleton skeleton-card" style="height: 300px;"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-white fw-bold">Complaints by Category</div>
                <div class="card-body" id="categoryChartContainer">
                    <div class="skeleton skeleton-card" style="height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="mt-5 py-3 text-center text-muted">
    <small>Voice-Driven Virtual Customer Success Manager &bull; Built with Spring Boot &amp; Omnidim.io</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/spinners.js"></script>
<script th:inline="javascript">
    // Hide spinner when page loads
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const spinner = document.getElementById('pageSpinner');
            if (spinner) {
                spinner.classList.remove('active');
            }
        }, 500);
    });

    const stats = {
        open: /*[[${complaintStats.open}]]*/ 0,
        inProgress: /*[[${complaintStats.inProgress}]]*/ 0,
        resolved: /*[[${complaintStats.resolved}]]*/ 0,
        closed: /*[[${complaintStats.closed}]]*/ 0
    };

    // Show spinner while loading charts
    if (window.spinnerManager) {
        window.spinnerManager.showOverlay();
    }

    // Status Chart
    const statusCtx = document.createElement('canvas');
    document.getElementById('statusChartContainer').innerHTML = '';
    document.getElementById('statusChartContainer').appendChild(statusCtx);
    
    new Chart(statusCtx, {
        type: 'doughnut',
        data: {
            labels: ['Open', 'In Progress', 'Resolved', 'Closed'],
            datasets: [{
                data: [stats.open, stats.inProgress, stats.resolved, stats.closed],
                backgroundColor: ['#dc3545', '#ffc107', '#28a745', '#6c757d']
            }]
        }
    });

    // Category Chart with loading indicator
    fetch('/api/analytics')
        .then(r => r.json())
        .then(data => {
            const cats = data.complaintsByCategory || {};
            const categoryCtx = document.createElement('canvas');
            document.getElementById('categoryChartContainer').innerHTML = '';
            document.getElementById('categoryChartContainer').appendChild(categoryCtx);
            
            new Chart(categoryCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(cats),
                    datasets: [{
                        label: 'Complaints',
                        data: Object.values(cats),
                        backgroundColor: '#8b5cf6'
                    }]
                },
                options: { plugins: { legend: { display: false } } }
            });
            
            // Hide spinner after charts load
            if (window.spinnerManager) {
                window.spinnerManager.hideOverlay();
            }
        })
        .catch(error => {
            console.error('Error loading analytics:', error);
            document.getElementById('categoryChartContainer').innerHTML = 
                '<div class="alert alert-danger">Failed to load category data. Please refresh.</div>';
            if (window.spinnerManager) {
                window.spinnerManager.hideOverlay();
            }
        });
</script>
</body>
</html>
