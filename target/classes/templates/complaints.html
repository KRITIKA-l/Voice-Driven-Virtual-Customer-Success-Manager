<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints - VCSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/ui.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/spinners.css">
</head>
<body>

<!-- Page Load Spinner Overlay -->
<div class="spinner-overlay" id="pageSpinner">
    <div class="spinner"></div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark app-nav">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/"><i class="fas fa-robot me-2"></i>Virtual Customer Success Manager</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
            <a class="nav-link active" href="/complaints">Complaints</a>
            <a class="nav-link" href="/events">Events</a>
            <a class="nav-link" href="/analytics">Analytics</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold"><i class="fas fa-exclamation-circle text-purple me-2"></i>Complaint Management</h4>
        <button class="btn btn-purple" data-bs-toggle="modal" data-bs-target="#fileComplaintModal">
            <span class="btn-spinner"></span>
            <span class="btn-text"><i class="fas fa-plus me-1"></i>New Complaint</span>
        </button>
    </div>

    <!-- Stats Row -->
    <div class="row g-2 mb-4">
        <div class="col">
            <div class="card text-center border-danger">
                <div class="card-body py-2">
                    <h5 class="text-danger mb-0" th:text="${stats.open}">0</h5>
                    <small>Open</small>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-center border-warning">
                <div class="card-body py-2">
                    <h5 class="text-warning mb-0" th:text="${stats.inProgress}">0</h5>
                    <small>In Progress</small>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-center border-success">
                <div class="card-body py-2">
                    <h5 class="text-success mb-0" th:text="${stats.resolved}">0</h5>
                    <small>Resolved</small>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="card text-center border-secondary">
                <div class="card-body py-2">
                    <h5 class="mb-0" th:text="${stats.total}">0</h5>
                    <small>Total</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Complaints Table -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Resident</th>
                        <th>Apt</th>
                        <th>Category</th>
                        <th>Description</th>
                        <th>Status</th>
                        <th>Filed On</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${complaints.empty}">
                        <td colspan="8" class="text-center text-muted py-4">No complaints found.</td>
                    </tr>
                    <tr th:each="c : ${complaints}">
                        <td th:text="${c.id}">1</td>
                        <td th:text="${c.residentName}">Name</td>
                        <td th:text="${c.apartmentNumber ?: '-'}">Apt</td>
                        <td>
                            <span class="badge bg-secondary" th:text="${c.category}">CAT</span>
                        </td>
                        <td th:text="${#strings.abbreviate(c.description, 50)}">Desc</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${c.status.name() == 'OPEN' ? 'bg-danger' : (c.status.name() == 'IN_PROGRESS' ? 'bg-warning text-dark' : (c.status.name() == 'RESOLVED' ? 'bg-success' : 'bg-secondary'))}"
                                  th:text="${c.status}">Status</span>
                        </td>
                        <td th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy')}">Date</td>
                        <td>
                            <button class="btn btn-xs btn-outline-secondary" onclick="updateComplaintStatus(this, ${c.id})">
                                <span class="btn-spinner"></span>
                                <span class="btn-text">Update</span>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- File Complaint Modal -->
<div class="modal fade" id="fileComplaintModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle text-purple me-2"></i>File New Complaint</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Resident Name *</label>
                    <input type="text" id="m_name" class="form-control" placeholder="Full Name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Apartment Number</label>
                    <input type="text" id="m_apt" class="form-control" placeholder="e.g. A-101">
                </div>
                <div class="mb-3">
                    <label class="form-label">Contact Email</label>
                    <input type="email" id="m_email" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label">Category *</label>
                    <select id="m_category" class="form-select">
                        <option value="">Select Category</option>
                        <option>NOISE</option>
                        <option>MAINTENANCE</option>
                        <option>SECURITY</option>
                        <option>CLEANLINESS</option>
                        <option>PARKING</option>
                        <option>UTILITIES</option>
                        <option>OTHER</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description *</label>
                    <textarea id="m_desc" class="form-control" rows="3" placeholder="Describe the issue in detail"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                    <span class="btn-spinner"></span>
                    <span class="btn-text">Cancel</span>
                </button>
                <button type="button" class="btn btn-purple" onclick="submitComplaint()">
                    <span class="btn-spinner"></span>
                    <span class="btn-text">Submit Complaint</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/spinners.js"></script>
<script>
    // Hide spinner when page loads
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
            const spinner = document.getElementById('pageSpinner');
            if (spinner) {
                spinner.classList.remove('active');
            }
        }, 300);
    });

    // Modified submitComplaint with spinner
    function submitComplaint() {
        const btn = event.target;
        if (btn && btn.classList) {
            btn.classList.add('loading');
        }
        
        const name = document.getElementById('m_name').value;
        const apt = document.getElementById('m_apt').value;
        const category = document.getElementById('m_category').value;
        const desc = document.getElementById('m_desc').value;
        
        if (!name || !category || !desc) {
            alert('Please fill all required fields');
            if (btn) btn.classList.remove('loading');
            return;
        }
        
        fetch('/api/complaints', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                residentName: name,
                apartmentNumber: apt,
                category: category,
                description: desc,
                email: document.getElementById('m_email').value
            })
        })
        .then(r => r.json())
        .then(data => {
            if (btn) btn.classList.remove('loading');
            if (data.id) {
                alert('Complaint filed! ID: ' + data.id);
                location.reload();
            } else {
                alert('Error: ' + JSON.stringify(data));
            }
        })
        .catch(err => {
            if (btn) btn.classList.remove('loading');
            alert('Network error. Please try again.');
        });
    }

    // Modified updateComplaintStatus with spinner
    function updateComplaintStatus(btn, id) {
        btn.classList.add('loading');
        
        const newStatus = prompt('Enter new status (OPEN, IN_PROGRESS, RESOLVED, CLOSED):');
        if (!newStatus) {
            btn.classList.remove('loading');
            return;
        }
        
        fetch(`/api/complaints/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus })
        })
        .then(r => r.json())
        .then(data => {
            btn.classList.remove('loading');
            if (data.id) {
                alert('Status updated!');
                location.reload();
            } else {
                alert('Error updating status');
            }
        })
        .catch(err => {
            btn.classList.remove('loading');
            alert('Network error. Please try again.');
        });
    }
</script>
</body>
</html>
